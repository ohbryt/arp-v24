name: ARP Pipeline Tests

on:
  push:
    branches: [main, yars2-sirna-pf14-2026, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -q pytest pytest-asyncio 2>/dev/null || true
          pip list | grep -E "duckdb|click|rich" || echo "Optional deps not installed"

      - name: Import check - arp_orchestrator
        run: python3 -c "from arp_orchestrator import ARPOrchestrator; print('✓ arp_orchestrator OK')"

      - name: Import check - boltz2_client
        run: python3 -c "from boltz2_client import Boltz2Client; print('✓ boltz2_client OK')"

      - name: Import check - arp_db
        run: python3 -c "from arp_db import ARPLocalDB; print('✓ arp_db OK')"

      - name: CLI help check
        run: python3 arp_orchestrator.py --help 2>&1 | grep -q "playbook" && echo "✓ CLI help OK"

      - name: Boltz2Client instantiation
        run: python3 -c "from boltz2_client import Boltz2Client; c = Boltz2Client(); print('✓ Boltz2Client instantiated')"

  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check all Python files
        run: |
          find . -name "*.py" -not -path "./.git/*" -not -path "./.venv/*" -exec python3 -m py_compile {} \; 2>&1 || true
          echo "✓ Syntax check complete"

      - name: Check for required functions
        run: |
          grep -l "def run\|def search\|def predict" arp_orchestrator.py boltz2_client.py arp_db.py 2>/dev/null && echo "✓ Core functions found"