<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .title { font: 700 34px Arial, sans-serif; fill: #1f2937; }
      .sub { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .label { font: 500 21px Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 18px Arial, sans-serif; fill: #374151; }
      .axis { stroke: #111827; stroke-width: 3; }
      .grid { stroke: #d1d5db; stroke-width: 1; }
      .pre { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 3; rx: 12; }
      .trans { fill: #fef3c7; stroke: #b45309; stroke-width: 3; rx: 12; }
      .clin { fill: #dcfce7; stroke: #15803d; stroke-width: 3; rx: 12; }
      .note { fill: #ffffff; stroke: #9ca3af; stroke-width: 2; rx: 12; }
      .flow { stroke: #111827; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111827"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="60" y="70">Figure 3. Therapeutic and biomarker landscape for one-carbon metabolism in cancer</text>

  <line class="axis" x1="150" y1="740" x2="1450" y2="740"/>
  <line class="axis" x1="150" y1="160" x2="150" y2="740"/>
  <text class="sub" x="1180" y="790">Clinical maturity</text>
  <text class="sub" x="40" y="170" transform="rotate(-90 40 170)">Biomarker clarity</text>

  <line class="grid" x1="150" y1="560" x2="1450" y2="560"/>
  <line class="grid" x1="150" y1="380" x2="1450" y2="380"/>
  <line class="grid" x1="475" y1="160" x2="475" y2="740"/>
  <line class="grid" x1="850" y1="160" x2="850" y2="740"/>
  <line class="grid" x1="1175" y1="160" x2="1175" y2="740"/>

  <text class="small" x="230" y="780">preclinical</text>
  <text class="small" x="595" y="780">translation</text>
  <text class="small" x="980" y="780">early clinic</text>
  <text class="small" x="1290" y="780">precision clinic</text>
  <text class="small" x="55" y="585">expression-based</text>
  <text class="small" x="74" y="405">mixed</text>
  <text class="small" x="63" y="225">genotype-led</text>

  <rect class="pre" x="240" y="470" width="230" height="92" rx="12"/>
  <text class="label" x="322" y="510">PHGDH</text>
  <text class="small" x="285" y="540">amplification / serine state</text>

  <rect class="pre" x="520" y="455" width="230" height="92" rx="12"/>
  <text class="label" x="612" y="495">SHMT</text>
  <text class="small" x="567" y="525">folate stress combinations</text>

  <rect class="trans" x="680" y="330" width="260" height="96" rx="12"/>
  <text class="label" x="770" y="370">MTHFD2</text>
  <text class="small" x="723" y="401">expression plus flux markers</text>

  <rect class="clin" x="1120" y="215" width="250" height="102" rx="12"/>
  <text class="label" x="1202" y="255">MAT2A</text>
  <text class="small" x="1169" y="285">MTAP deletion anchors use</text>

  <rect class="clin" x="1210" y="365" width="230" height="102" rx="12"/>
  <text class="label" x="1268" y="405">PRMT5</text>
  <text class="small" x="1232" y="435">MTA-cooperative strategy</text>

  <rect class="note" x="250" y="200" width="330" height="110" rx="12"/>
  <text class="label" x="308" y="240">Pharmacodynamic layer</text>
  <text class="small" x="287" y="272">SAM / SAH, SDMA, formate, folate pools</text>

  <rect class="note" x="690" y="600" width="360" height="110" rx="12"/>
  <text class="label" x="778" y="640">Rational combinations</text>
  <text class="small" x="730" y="672">immunotherapy, antifolates, DDR, taxanes</text>

  <path class="flow" d="M470 510 L520 501"/>
  <path class="flow" d="M750 500 L810 426"/>
  <path class="flow" d="M940 378 L1120 270"/>
  <path class="flow" d="M1245 317 L1290 365"/>
  <path class="flow" d="M580 255 L760 330"/>
  <path class="flow" d="M920 600 L920 427"/>

  <text class="small" x="90" y="835">Most mature precision strategy: MTAP deletion with MAT2A or MTA-cooperative PRMT5 inhibition. Other nodes need flux-aware biomarkers to translate cleanly.</text>
</svg>
