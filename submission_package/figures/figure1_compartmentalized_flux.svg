  <text class="label" x="405" y="435">10-formyl-THF</text>
  <rect class="target" x="420" y="477" width="104" height="34" rx="8"/>
  <text class="targettext" x="442" y="500">MTHFD1L</text>
  <rect class="boxm" x="120" y="390" width="170" height="78" rx="12"/>
  <text class="label" x="177" y="435">Glycine</text>
  <rect class="boxred" x="110" y="540" width="200" height="62" rx="12"/>
