  <rect class="boxred" x="930" y="555" width="220" height="78" rx="12"/>
  <text class="label" x="968" y="600">Transsulfuration / GSH</text>

  <path class="flow" d="M1040 390 L1040 303"/>
  <path class="flow" d="M1085 264 L1200 264"/>
  <path class="flow" d="M1325 468 L1325 555"/>
  <path class="flow" d="M1200 429 L1150 429"/>

  <path class="flow" d="M580 594 C710 594, 760 429, 930 429"/>
  <text class="small" x="695" y="560">formate overflow</text>

  <rect class="target" x="87" y="735" width="98" height="34" rx="8"/>
  <text class="targettext" x="105" y="758">PHGDH</text>
  <text class="small" x="205" y="758">serine supply to the folate network</text>

  <text class="small" x="95" y="805">Principal outputs: nucleotide synthesis, methyl-donor generation, and redox buffering.</text>
