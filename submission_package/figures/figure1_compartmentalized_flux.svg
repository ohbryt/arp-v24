  <rect class="boxc" x="860" y="130" width="670" height="500" rx="18"/>
  <text class="sub" x="885" y="170">Cytosol: biosynthesis and methylation</text>
  <rect class="boxc" x="930" y="225" width="220" height="78" rx="12"/>
  <text class="label" x="986" y="270">Purine synthesis</text>
  <rect class="boxc" x="1200" y="225" width="220" height="78" rx="12"/>
  <text class="label" x="1245" y="270">dTMP / TYMS</text>
  <rect class="boxc" x="930" y="390" width="220" height="78" rx="12"/>
  <text class="label" x="980" y="435">MTHFD1 folate</text>
  <rect class="boxmeth" x="1200" y="390" width="250" height="78" rx="12"/>
