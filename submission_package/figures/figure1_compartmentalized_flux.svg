  <text class="label" x="425" y="600">Formate</text>

  <path class="flow" d="M290 264 L360 264"/>
  <path class="flow" d="M470 303 L470 390"/>
  <path class="flow" d="M360 429 L290 429"/>
  <path class="flow" d="M470 468 L470 555"/>
  <path class="dashed" d="M290 282 C320 330, 330 410, 250 540"/>
