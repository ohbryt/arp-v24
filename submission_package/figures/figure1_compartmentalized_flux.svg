<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .title { font: 700 34px Arial, sans-serif; fill: #1f2937; }
      .sub { font: 600 24px Arial, sans-serif; fill: #1f2937; }
      .label { font: 500 22px Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 18px Arial, sans-serif; fill: #374151; }
      .boxm { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 3; rx: 12; }
      .boxc { fill: #dcfce7; stroke: #15803d; stroke-width: 3; rx: 12; }
      .boxmeth { fill: #fef3c7; stroke: #b45309; stroke-width: 3; rx: 12; }
      .boxred { fill: #fee2e2; stroke: #b91c1c; stroke-width: 3; rx: 12; }
      .target { fill: #111827; stroke: #111827; stroke-width: 2; rx: 8; }
      .targettext { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .flow { stroke: #111827; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #6b7280; stroke-width: 3; stroke-dasharray: 10 8; fill: none; marker-end: url(#arrowgray); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111827"/>
    </marker>
    <marker id="arrowgray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="60" y="70">Figure 1. Compartmentalized one-carbon flux in cancer</text>

  <rect class="boxm" x="70" y="130" width="620" height="500" rx="18"/>
